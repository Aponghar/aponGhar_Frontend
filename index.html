<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AponGhar</title>

  <script src="config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle at 10% 20%, hsl(165, 80%, 23%) 0%, hsl(45, 90%, 40%) 45%, hsl(165, 60%, 8%) 90%);
      color:white;
      text-align:center;
      overflow: hidden;
      position: relative;
    }

    /* Abstract background glowing shapes */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196, 242, 221, 0.15) 0%, rgba(165, 80, 23, 0) 70%);
      z-index: 1;
    }

    body::before {
      top: -100px;
      left: -100px;
    }

    body::after {
      bottom: -150px;
      right: -100px;
    }

    .container{
      max-width:650px;
      width: 90%;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
      z-index: 10;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1.logo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .main-logo {
      max-width: 320px;
      width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(212, 175, 55, 0.15);
      border: 1.5px solid rgba(212, 175, 55, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .main-logo:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 175, 55, 0.3);
      border-color: rgba(212, 175, 55, 0.4);
    }

    p{
      font-size:20px;
      font-weight: 300;
      margin-bottom:45px;
      line-height:1.6;
      color: rgba(255, 255, 255, 0.8);
    }

    .buttons{
      display:flex;
      gap:20px;
      justify-content:center;
    }

    button{
      padding:16px 44px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight: 700;
      cursor:pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login{
      background:white;
      color: hsl(165, 80%, 23%);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
    }

    .login:hover{
      transform:translateY(-3px);
      background: #f0f7f4;
      box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
    }

    .login:active{
      transform:translateY(-1px);
    }

    .signup{
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .signup:hover{
      transform:translateY(-3px);
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    .signup:active{
      transform:translateY(-1px);
    }

    .guest{
      background: hsla(165, 80%, 23%, 0.3);
      color: white;
      border: 1px solid hsla(165, 80%, 23%, 0.5);
      box-shadow: 0 10px 20px hsla(165, 80%, 23%, 0.15);
    }
 
    .guest:hover{
      transform:translateY(-3px);
      background: hsla(165, 80%, 23%, 0.45);
      border-color: hsla(165, 80%, 23%, 0.7);
      box-shadow: 0 15px 30px hsla(165, 80%, 23%, 0.35);
    }
 
    .guest:active{
      transform:translateY(-1px);
    }

  </style>

</head>
<body>

<div class="container">

  <h1 class="logo-container">
    <img src="./assets/logo.jpg" alt="AponGhar - Hotel & Homestay Booking and Management Platform" class="main-logo">
  </h1>

  <p>
    Hotel & Homestay Booking and Management Platform
  </p>

  <div class="buttons">

    <button
      class="login"
      onclick="goLogin()"
    >
      Login
    </button>

    <button
      class="signup"
      onclick="goSignup()"
    >
      Sign Up
    </button>

    <button
      class="guest"
      onclick="goGuest()"
    >
      Browse as Guest
    </button>

  </div>

</div>

<script>

function goLogin(){

  localStorage.setItem("authMode", "login");

  window.location.href =
  "./auth/auth.html";
}

function goSignup(){

  localStorage.setItem("authMode", "register");

  window.location.href =
  "./auth/auth.html";
}

function goGuest(){
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "./home/home.html";
}

</script>

</body>
</html>
