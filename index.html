<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AponGhar</title>

  <script src="config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle at 10% 20%, hsl(220, 16%, 15%) 0%, hsl(41, 52%, 18%) 45%, hsl(220, 16%, 6%) 90%);
      color:white;
      text-align:center;
      overflow: hidden;
      position: relative;
    }

    /* Abstract background glowing shapes */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.12) 0%, rgba(201, 168, 76, 0) 70%);
      z-index: 1;
      pointer-events: none;
    }

    body::before {
      top: -150px;
      left: -150px;
    }

    body::after {
      bottom: -200px;
      right: -150px;
    }

    .container{
      max-width:600px;
      width: 90%;
      padding: 50px 40px;
      background: rgba(30, 35, 41, 0.6);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      z-index: 10;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1.logo-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .main-logo {
      max-width: 280px;
      width: 100%;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5), 0 0 25px rgba(201, 168, 76, 0.15);
      border: 1.5px solid rgba(201, 168, 76, 0.3);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .main-logo:hover {
      transform: scale(1.04) translateY(-2px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6), 0 0 35px rgba(201, 168, 76, 0.35);
      border-color: rgba(201, 168, 76, 0.5);
    }

    p{
      font-size:16px;
      font-weight: 400;
      margin-bottom:40px;
      line-height:1.6;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .buttons{
      display:flex;
      gap:16px;
      justify-content:center;
      align-items: center;
    }

    button{
      flex: 1;
      padding:16px 28px;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight: 700;
      cursor:pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
    }

    .login{
      background: linear-gradient(135deg, #9B7A28, #C9A84C);
      color: white;
      box-shadow: 0 8px 25px rgba(201, 168, 76, 0.25);
    }

    .login:hover{
      transform:translateY(-3px);
      background: linear-gradient(135deg, #A88630, #DCC060);
      box-shadow: 0 12px 30px rgba(201, 168, 76, 0.4);
    }

    .login:active{
      transform:translateY(-1px);
    }

    .signup{
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
    }

    .signup:hover{
      transform:translateY(-3px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .signup:active{
      transform:translateY(-1px);
    }

    .guest{
      background: rgba(201, 168, 76, 0.12);
      color: #E8C96A;
      border: 1.5px solid rgba(201, 168, 76, 0.25);
      box-shadow: 0 8px 25px rgba(201, 168, 76, 0.1);
    }
 
    .guest:hover{
      transform:translateY(-3px);
      background: rgba(201, 168, 76, 0.22);
      border-color: #E8C96A;
      color: white;
      box-shadow: 0 12px 30px rgba(201, 168, 76, 0.25);
    }
 
    .guest:active{
      transform:translateY(-1px);
    }

    /* ── MOBILE RESPONSIVENESS ── */
    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
        width: 92%;
        border-radius: 20px;
      }
      .buttons {
        flex-direction: column;
        gap: 12px;
      }
      button {
        width: 100%;
        flex: none;
        padding: 14px 20px;
        font-size: 15px;
      }
      p {
        font-size: 14px;
        margin-bottom: 30px;
      }
      .main-logo {
        max-width: 220px;
      }
    }

  </style>

</head>
<body>

<div class="container">

  <h1 class="logo-container">
    <img src="./assets/logo-full.jpg" alt="AponGhar - Hotel & Homestay Booking and Management Platform" class="main-logo">
  </h1>

  <p>
    Hotel & Homestay Booking and Management Platform
  </p>

  <div class="buttons">

    <button
      class="login"
      onclick="goLogin()"
    >
      Login
    </button>

    <button
      class="signup"
      onclick="goSignup()"
    >
      Sign Up
    </button>

    <button
      class="guest"
      onclick="goGuest()"
    >
      Browse as Guest
    </button>

  </div>

</div>

<script>

function goLogin(){

  localStorage.setItem("authMode", "login");

  window.location.href =
  "./auth/auth.html";
}

function goSignup(){

  localStorage.setItem("authMode", "register");

  window.location.href =
  "./auth/auth.html";
}

function goGuest(){
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "./home/home.html";
}

</script>

</body>
</html>
